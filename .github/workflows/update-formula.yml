name: Update Formula with Latest Versions

on:
  schedule:
    # 每30分钟运行一次
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for new versions
        id: check
        run: |
          # 获取 GitHub 上最新的50个版本
          GITHUB_VERSIONS=$(curl -s "https://api.github.com/repos/router-for-me/CLIProxyAPI/releases?per_page=50" | jq -r '.[].tag_name' | sed 's/v//' | sort -V)

          # 找出新增的版本（本地没有的）
          NEW_VERSIONS=""
          for v in $GITHUB_VERSIONS; do
            if [ ! -f "Formula/cliproxyapi@${v}.rb" ]; then
              NEW_VERSIONS="$NEW_VERSIONS $v"
            fi
          done

          NEW_VERSIONS=$(echo $NEW_VERSIONS | xargs)
          LATEST_VERSION=$(echo "$GITHUB_VERSIONS" | tail -1)

          echo "new_versions=$NEW_VERSIONS" >> $GITHUB_OUTPUT
          echo "latest_version=$LATEST_VERSION" >> $GITHUB_OUTPUT

          if [ -n "$NEW_VERSIONS" ]; then
            echo "needs_update=true" >> $GITHUB_OUTPUT
            echo "Found new versions: $NEW_VERSIONS"
          else
            echo "needs_update=false" >> $GITHUB_OUTPUT
            echo "No new versions found"
          fi

      - name: Generate formulas for new versions
        if: steps.check.outputs.needs_update == 'true'
        run: |
          # 创建临时目录存储 SHA256
          mkdir -p /tmp/cliproxyapi-shas

          IFS=' ' read -ra VERSIONS <<< "${{ steps.check.outputs.new_versions }}"

          for VERSION in "${VERSIONS[@]}"; do
            echo "Processing version: $VERSION"

            # 获取 SHA256 并保存
            curl -sL "https://github.com/router-for-me/CLIProxyAPI/releases/download/v${VERSION}/CLIProxyAPI_${VERSION}_darwin_amd64.tar.gz" | shasum -a 256 | awk '{print $1}' > /tmp/cliproxyapi-shas/${VERSION}_darwin_amd64

            curl -sL "https://github.com/router-for-me/CLIProxyAPI/releases/download/v${VERSION}/CLIProxyAPI_${VERSION}_darwin_aarch64.tar.gz" | shasum -a 256 | awk '{print $1}' > /tmp/cliproxyapi-shas/${VERSION}_darwin_aarch64

            curl -sL "https://github.com/router-for-me/CLIProxyAPI/releases/download/v${VERSION}/CLIProxyAPI_${VERSION}_linux_amd64.tar.gz" | shasum -a 256 | awk '{print $1}' > /tmp/cliproxyapi-shas/${VERSION}_linux_amd64

            curl -sL "https://github.com/router-for-me/CLIProxyAPI/releases/download/v${VERSION}/CLIProxyAPI_${VERSION}_linux_aarch64.tar.gz" | shasum -a 256 | awk '{print $1}' > /tmp/cliproxyapi-shas/${VERSION}_linux_aarch64

            # 读取 SHA256
            SHA_DARWIN_AMD64=$(cat /tmp/cliproxyapi-shas/${VERSION}_darwin_amd64)
            SHA_DARWIN_ARM64=$(cat /tmp/cliproxyapi-shas/${VERSION}_darwin_aarch64)
            SHA_LINUX_AMD64=$(cat /tmp/cliproxyapi-shas/${VERSION}_linux_amd64)
            SHA_LINUX_ARM64=$(cat /tmp/cliproxyapi-shas/${VERSION}_linux_aarch64)

            # 创建 class 名称（版本号转换为有效的 Ruby class 名）
            CLASS_NAME="CliproxyapiAT$(echo ${VERSION} | tr -d '.')"

            # 创建版本化的 formula
            cat > "Formula/cliproxyapi@${VERSION}.rb" << EOF
class ${CLASS_NAME} < Formula
  desc "Wrap Gemini CLI, Codex, Claude Code, Qwen Code as an API service"
  homepage "https://github.com/router-for-me/CLIProxyAPI"
  license "MIT"

  version "${VERSION}"

  on_macos do
    on_intel do
      url "https://github.com/router-for-me/CLIProxyAPI/releases/download/v${VERSION}/CLIProxyAPI_${VERSION}_darwin_amd64.tar.gz"
      sha256 "${SHA_DARWIN_AMD64}"
    end
    on_arm do
      url "https://github.com/router-for-me/CLIProxyAPI/releases/download/v${VERSION}/CLIProxyAPI_${VERSION}_darwin_aarch64.tar.gz"
      sha256 "${SHA_DARWIN_ARM64}"
    end
  end

  on_linux do
    on_intel do
      url "https://github.com/router-for-me/CLIProxyAPI/releases/download/v${VERSION}/CLIProxyAPI_${VERSION}_linux_amd64.tar.gz"
      sha256 "${SHA_LINUX_AMD64}"
    end
    on_arm do
      url "https://github.com/router-for-me/CLIProxyAPI/releases/download/v${VERSION}/CLIProxyAPI_${VERSION}_linux_aarch64.tar.gz"
      sha256 "${SHA_LINUX_ARM64}"
    end
  end

  def install
    bin.install "cli-proxy-api" => "cliproxyapi"
  end

  test do
    assert_match "CLIProxyAPI Version: ${VERSION}", shell_output("#{bin}/cliproxyapi version")
  end
end
EOF

            echo "Created Formula/cliproxyapi@${VERSION}.rb"
          done

          # 保存 SHA256 到环境供下一步使用
          cp -r /tmp/cliproxyapi-shas /tmp/shas_backup

      - name: Update main formula to latest version
        if: steps.check.outputs.needs_update == 'true'
        run: |
          VERSION="${{ steps.check.outputs.latest_version }}"

          # 获取 SHA256
          SHA_DARWIN_AMD64=$(curl -sL "https://github.com/router-for-me/CLIProxyAPI/releases/download/v${VERSION}/CLIProxyAPI_${VERSION}_darwin_amd64.tar.gz" | shasum -a 256 | awk '{print $1}')
          SHA_DARWIN_ARM64=$(curl -sL "https://github.com/router-for-me/CLIProxyAPI/releases/download/v${VERSION}/CLIProxyAPI_${VERSION}_darwin_aarch64.tar.gz" | shasum -a 256 | awk '{print $1}')
          SHA_LINUX_AMD64=$(curl -sL "https://github.com/router-for-me/CLIProxyAPI/releases/download/v${VERSION}/CLIProxyAPI_${VERSION}_linux_amd64.tar.gz" | shasum -a 256 | awk '{print $1}')
          SHA_LINUX_ARM64=$(curl -sL "https://github.com/router-for-me/CLIProxyAPI/releases/download/v${VERSION}/CLIProxyAPI_${VERSION}_linux_aarch64.tar.gz" | shasum -a 256 | awk '{print $1}')

          cat > Formula/cliproxyapi.rb << 'MAINEOF'
class Cliproxyapi < Formula
  desc "Wrap Gemini CLI, Codex, Claude Code, Qwen Code as an API service"
  homepage "https://github.com/router-for-me/CLIProxyAPI"
  license "MIT"

  version "VERSION_PLACEHOLDER"

  on_macos do
    on_intel do
      url "https://github.com/router-for-me/CLIProxyAPI/releases/download/vVERSION_PLACEHOLDER/CLIProxyAPI_VERSION_PLACEHOLDER_darwin_amd64.tar.gz"
      sha256 "SHA_DARWIN_AMD64_PLACEHOLDER"
    end
    on_arm do
      url "https://github.com/router-for-me/CLIProxyAPI/releases/download/vVERSION_PLACEHOLDER/CLIProxyAPI_VERSION_PLACEHOLDER_darwin_aarch64.tar.gz"
      sha256 "SHA_DARWIN_ARM64_PLACEHOLDER"
    end
  end

  on_linux do
    on_intel do
      url "https://github.com/router-for-me/CLIProxyAPI/releases/download/vVERSION_PLACEHOLDER/CLIProxyAPI_VERSION_PLACEHOLDER_linux_amd64.tar.gz"
      sha256 "SHA_LINUX_AMD64_PLACEHOLDER"
    end
    on_arm do
      url "https://github.com/router-for-me/CLIProxyAPI/releases/download/vVERSION_PLACEHOLDER/CLIProxyAPI_VERSION_PLACEHOLDER_linux_aarch64.tar.gz"
      sha256 "SHA_LINUX_ARM64_PLACEHOLDER"
    end
  end

  def install
    bin.install "cli-proxy-api" => "cliproxyapi"
  end

  def post_install
    (etc/"cliproxyapi.conf.default").write <<~EOS
      # CLIProxyAPI Configuration File
      # Edit this file to configure cliproxyapi
    EOS
  end

  service do
    run [opt_bin/"cliproxyapi", "-config", etc/"cliproxyapi.conf"]
    keep_alive true
  end

  test do
    assert_match "CLIProxyAPI Version: VERSION_PLACEHOLDER", shell_output("#{bin}/cliproxyapi version")
  end
end
MAINEOF

          # 替换占位符
          sed -i '' "s/VERSION_PLACEHOLDER/${VERSION}/g" Formula/cliproxyapi.rb
          sed -i '' "s/SHA_DARWIN_AMD64_PLACEHOLDER/${SHA_DARWIN_AMD64}/g" Formula/cliproxyapi.rb
          sed -i '' "s/SHA_DARWIN_ARM64_PLACEHOLDER/${SHA_DARWIN_ARM64}/g" Formula/cliproxyapi.rb
          sed -i '' "s/SHA_LINUX_AMD64_PLACEHOLDER/${SHA_LINUX_AMD64}/g" Formula/cliproxyapi.rb
          sed -i '' "s/SHA_LINUX_ARM64_PLACEHOLDER/${SHA_LINUX_ARM64}/g" Formula/cliproxyapi.rb

      - name: Create Pull Request
        if: steps.check.outputs.needs_update == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: "chore: add new CLIProxyAPI versions (${{ steps.check.outputs.new_versions }})"
          title: "Add CLIProxyAPI versions: ${{ steps.check.outputs.new_versions }}"
          body: |
            Automatically added new versions from upstream repository.

            **New versions added:**
            ${{ steps.check.outputs.new_versions }}

            **Latest version:** ${{ steps.check.outputs.latest_version }}

            Users can now install any version with:
            ```bash
            brew install cliproxyapi@7.2.90
            brew install cliproxyapi@7.2.91
            # or latest
            brew install cliproxyapi
            ```
          branch: update/versions-${{ github.run_number }}
          delete-branch: true
          labels: dependencies, automated

      - name: Notify - No update needed
        if: steps.check.outputs.needs_update == 'false'
        run: |
          echo "✅ All versions are up to date"
