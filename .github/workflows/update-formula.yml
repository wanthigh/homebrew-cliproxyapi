name: Update Formula with Latest Version

on:
  schedule:
    # 每天 UTC 时间 00:00 运行（可根据需要调整）
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check latest CLIProxyAPI version
        id: check
        run: |
          # 获取最新版本信息
          LATEST=$(curl -s https://api.github.com/repos/router-for-me/CLIProxyAPI/releases/latest | jq -r '.tag_name' | sed 's/v//')
          CURRENT=$(grep 'version "' Formula/cliproxyapi.rb | head -1 | sed 's/.*version "//' | sed 's/".*//')

          echo "latest=$LATEST" >> $GITHUB_OUTPUT
          echo "current=$CURRENT" >> $GITHUB_OUTPUT

          if [ "$LATEST" != "$CURRENT" ]; then
            echo "needs_update=true" >> $GITHUB_OUTPUT
          else
            echo "needs_update=false" >> $GITHUB_OUTPUT
          fi

      - name: Get SHA256 for all platforms
        if: steps.check.outputs.needs_update == 'true'
        id: shas
        run: |
          VERSION=${{ steps.check.outputs.latest }}

          # macOS Intel
          SHA_DARWIN_AMD64=$(curl -sL https://github.com/router-for-me/CLIProxyAPI/releases/download/v${VERSION}/CLIProxyAPI_${VERSION}_darwin_amd64.tar.gz | sha256sum | cut -d' ' -f1)

          # macOS ARM
          SHA_DARWIN_ARM64=$(curl -sL https://github.com/router-for-me/CLIProxyAPI/releases/download/v${VERSION}/CLIProxyAPI_${VERSION}_darwin_aarch64.tar.gz | sha256sum | cut -d' ' -f1)

          # Linux Intel
          SHA_LINUX_AMD64=$(curl -sL https://github.com/router-for-me/CLIProxyAPI/releases/download/v${VERSION}/CLIProxyAPI_${VERSION}_linux_amd64.tar.gz | sha256sum | cut -d' ' -f1)

          # Linux ARM
          SHA_LINUX_ARM64=$(curl -sL https://github.com/router-for-me/CLIProxyAPI/releases/download/v${VERSION}/CLIProxyAPI_${VERSION}_linux_aarch64.tar.gz | sha256sum | cut -d' ' -f1)

          echo "darwin_amd64=$SHA_DARWIN_AMD64" >> $GITHUB_OUTPUT
          echo "darwin_arm64=$SHA_DARWIN_ARM64" >> $GITHUB_OUTPUT
          echo "linux_amd64=$SHA_LINUX_AMD64" >> $GITHUB_OUTPUT
          echo "linux_arm64=$SHA_LINUX_ARM64" >> $GITHUB_OUTPUT

      - name: Update formula
        if: steps.check.outputs.needs_update == 'true'
        run: |
          VERSION=${{ steps.check.outputs.latest }}
          cat > Formula/cliproxyapi.rb << 'EOF'
class Cliproxyapi < Formula
  desc "Wrap Gemini CLI, Codex, Claude Code, Qwen Code as an API service"
  homepage "https://github.com/router-for-me/CLIProxyAPI"
  license "MIT"

  version "${{ steps.check.outputs.latest }}"

  on_macos do
    on_intel do
      url "https://github.com/router-for-me/CLIProxyAPI/releases/download/v${{ steps.check.outputs.latest }}/CLIProxyAPI_${{ steps.check.outputs.latest }}_darwin_amd64.tar.gz"
      sha256 "${{ steps.shas.outputs.darwin_amd64 }}"
    end
    on_arm do
      url "https://github.com/router-for-me/CLIProxyAPI/releases/download/v${{ steps.check.outputs.latest }}/CLIProxyAPI_${{ steps.check.outputs.latest }}_darwin_aarch64.tar.gz"
      sha256 "${{ steps.shas.outputs.darwin_arm64 }}"
    end
  end

  on_linux do
    on_intel do
      url "https://github.com/router-for-me/CLIProxyAPI/releases/download/v${{ steps.check.outputs.latest }}/CLIProxyAPI_${{ steps.check.outputs.latest }}_linux_amd64.tar.gz"
      sha256 "${{ steps.shas.outputs.linux_amd64 }}"
    end
    on_arm do
      url "https://github.com/router-for-me/CLIProxyAPI/releases/download/v${{ steps.check.outputs.latest }}/CLIProxyAPI_${{ steps.check.outputs.latest }}_linux_aarch64.tar.gz"
      sha256 "${{ steps.shas.outputs.linux_arm64 }}"
    end
  end

  def install
    bin.install "cli-proxy-api" => "cliproxyapi"
  end

  def post_install
    (etc/"cliproxyapi.conf.default").write <<~EOS
      # CLIProxyAPI Configuration File
      # Edit this file to configure cliproxyapi
    EOS
  end

  service do
    run [opt_bin/"cliproxyapi", "-config", etc/"cliproxyapi.conf"]
    keep_alive true
  end

  test do
    assert_match "CLIProxyAPI Version: ${{ steps.check.outputs.latest }}", shell_output("#{bin}/cliproxyapi version")
  end
end
EOF

      - name: Create Pull Request
        if: steps.check.outputs.needs_update == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: "chore: bump cliproxyapi to ${{ steps.check.outputs.latest }}"
          title: "Update CLIProxyAPI to ${{ steps.check.outputs.latest }}"
          body: |
            Automatically updated from ${{ steps.check.outputs.current }} to ${{ steps.check.outputs.latest }}

            Changes:
            - Updated macOS Intel SHA: `${{ steps.shas.outputs.darwin_amd64 }}`
            - Updated macOS ARM SHA: `${{ steps.shas.outputs.darwin_arm64 }}`
            - Updated Linux Intel SHA: `${{ steps.shas.outputs.linux_amd64 }}`
            - Updated Linux ARM SHA: `${{ steps.shas.outputs.linux_arm64 }}`
          branch: update/cliproxyapi-${{ steps.check.outputs.latest }}
          delete-branch: true
          labels: dependencies, automated

      - name: Notify - No update needed
        if: steps.check.outputs.needs_update == 'false'
        run: |
          echo "✅ Already at latest version: ${{ steps.check.outputs.current }}"
